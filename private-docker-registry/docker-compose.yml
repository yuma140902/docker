version: '3.8'

services:
  registry:
    image: registry:latest@sha256:6c5666b861f3505b116bb9aa9b25175e71210414bd010d92035ff64018f9457e
    container_name: registry
    restart: always
    hostname: registry
    ports:
      - '5000:5000'
    volumes:
      - './registry:/var/lib/registry'
  registry-frontend:
    image: konradkleine/docker-registry-frontend:v2@sha256:181aad54ee64312a57f8ccba5247c67358de18886d5e2f383b8c4b80a7a5edf6
    container_name: registry-frontend
    restart: always
    hostname: registry-frontend
    environment:
      ENV_DOCKER_REGISTRY_HOST: registry
      ENV_DOCKER_REGISTRY_PORT: 5000
    ports:
      - 8080:80
    volumes:
      - ./scripts:/scripts
    command: /scripts/issue-159-workaround.sh
